# kubernetes/redpanda/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: video-search
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ['sh', '-c', 'chown -R 101:101 /var/lib/redpanda/data']
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:latest
          # --- FIX: Use 'args' instead of 'command', and add dev-container mode ---
          args:
            - redpanda
            - start
            - --mode
            - dev-container
            - --smp
            - "1"
            - --reserve-memory
            - "0M"
            - --overprovisioned
            - --node-id
            - "0"
            - --kafka-addr
            - "PLAINTEXT://0.0.0.0:9092"
            - --advertise-kafka-addr
            - "PLAINTEXT://redpanda.video-search.svc.cluster.local:9092"
          # ------------------------------------------------------------------------
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
