---
# kubernetes/secret.example.yaml
# TEMPLATE ONLY — copy to secret.yaml, fill in real values, and keep it gitignored.
# Apply with:  kubectl apply -f kubernetes/secret.yaml -n video-search
#
# Real secrets should ideally be managed via External Secrets Operator or AWS Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: video-search-secrets
  namespace: video-search
type: Opaque
stringData:
  # Postgres connection string (RDS or in-cluster StatefulSet)
  DATABASE_URL: "postgresql://video_user:video_password@gpu-tunnel.video-search.svc.cluster.local:5432/video_db?sslmode=require"

  # MinIO credentials (unused in production if S3_ENDPOINT is empty, but kept for symmetry)
  MINIO_USER: ""
  MINIO_PASSWORD: ""

  # SSH private key for the gpu-tunnel pod (base64-encoded in the real secret)
  # Generate with:  kubectl create secret generic gpu-ssh-key --from-file=id_rsa=~/.ssh/gpu_id_rsa
  # This field is here as documentation; the real key is created separately (see gpu-tunnel/deployment.yaml).
